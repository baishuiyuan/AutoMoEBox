<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jami 液态玻璃·最终完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#e6e6eb;padding:20px 0;display:flex;justify-content:center}
.phone{width:360px;height:720px;background:#fff;border-radius:30px;overflow:hidden;position:relative;box-shadow:0 10px 40px rgba(0,0,0,0.25)}
.screen{width:100%;height:100%;position:relative}
.page{position:absolute;width:100%;height:100%;top:0;left:0;background:var(--bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:16px;display:none;overflow-y:auto}
.page.active{display:block}

.header{display:flex;align-items:center;height:44px;margin-bottom:16px;border-bottom:1px solid rgba(0,0,0,0.1)}
.back{width:32px;height:32px;border-radius:16px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-weight:bold;color:#007aff;cursor:pointer}
.title{flex:1;text-align:center;font-size:18px;font-weight:600}
.more{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#007aff;font-size:20px;cursor:pointer}

.card{background:rgba(255,255,255,0.2);border-radius:24px;padding:16px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.3);box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn{background:rgba(0,122,255,0.15);border-radius:24px;padding:12px;text-align:center;font-weight:500;margin-top:12px;cursor:pointer}
.btn-red{background:rgba(255,59,48,0.15)}
.btn-gray{background:rgba(0,0,0,0.05)}
.btn-green{background:rgba(52,199,89,0.15)}

.input{width:100%;background:rgba(255,255,255,0.3);border-radius:20px;padding:12px 16px;border:1px solid rgba(255,255,255,0.4);margin-bottom:12px}
.list-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer}
.avatar{width:40px;height:40px;border-radius:50%;background:#007aff;margin-right:12px}
.avatar-group{width:40px;height:40px;border-radius:12px;background:#007aff;margin-right:12px}
.badge{width:18px;height:18px;border-radius:9px;background:#ff3b30;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;margin-left:auto}
.label{font-size:12px;color:#888;margin-bottom:4px}
.tabs{display:flex;gap:12px;margin:12px 0;font-size:14px}
.tab{cursor:pointer;padding:4px 8px;border-radius:12px}
.tab.active{background:#007aff;color:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.arrow{margin-left:auto;color:#888}

.bubble-area{padding-bottom:100px;padding-top:8px}
.bubble-left{max-width:70%;background:rgba(255,255,255,0.4);border-radius:18px 18px 18px 4px;padding:10px 14px;margin:8px 0;display:flex;align-items:flex-start;gap:8px}
.bubble-right{max-width:70%;background:rgba(0,122,255,0.3);border-radius:18px 18px 4px 18px;padding:10px 14px;margin:8px 0 8px auto}
.bubble-left .avatar,.bubble-right .avatar{width:32px;height:32px;flex-shrink:0}

.chat-input{position:absolute;bottom:64px;left:0;width:100%;padding:8px 12px;display:flex;gap:8px;background:var(--bg);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.2)}
.chat-input input{flex:1;border-radius:24px;margin:0}
.chat-input .btn{margin:0;padding:12px 16px}

.bottom-nav{position:absolute;bottom:0;left:0;width:100%;height:64px;background:rgba(255,255,255,0.3);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-around;border-top:1px solid rgba(255,255,255,0.2)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;color:#8e8e93;cursor:pointer;padding:4px}
.nav-item.active{color:#007aff}

.switch{width:50px;height:28px;border-radius:14px;background:#ccc;position:relative;cursor:pointer}
.switch::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:2px;left:2px;transition:0.2s}
.switch.on{background:#007aff}
.switch.on::after{left:24px}
.switch:disabled{opacity:0.5}

.qrcode{width:160px;height:160px;background:#fff;margin:20px auto;border-radius:16px}
.progress{height:8px;background:rgba(0,0,0,0.05);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;background:#007aff;width:60%}

.dialog{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;background:var(--bg);backdrop-filter:blur(24px);border-radius:24px;padding:20px;display:none;border:1px solid rgba(255,255,255,0.2)}
.dialog-title{font-size:16px;font-weight:600;margin-bottom:12px;text-align:center}
.dialog-btns{display:flex;gap:12px;margin-top:16px}
.dialog-btns .btn{flex:1;margin-top:0}
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:8px 16px;border-radius:12px;font-size:14px;display:none;white-space:nowrap}
